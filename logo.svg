<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
    <linearGradient id="shine" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.32)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Soft drop shadow -->
  <circle cx="51" cy="53" r="43" fill="rgba(199,125,255,0.22)"/>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="43" fill="url(#bg)"/>

  <!-- Inner shine -->
  <ellipse cx="37" cy="31" rx="20" ry="13" fill="url(#shine)" opacity="0.55"/>

  <!-- Bold C — stroke arc centered at (50,50) r=29 -->
  <path d="M 66 24 A 29 29 0 1 0 66 76"
        fill="none"
        stroke="white"
        stroke-width="12.5"
        stroke-linecap="round"/>

  <!-- Yellow 5-point star — top right -->
  <polygon points="80,14 81.7,19.2 87.2,19.2 82.8,22.4 84.4,27.6 80,24.4 75.6,27.6 77.2,22.4 72.8,19.2 78.3,19.2"
           fill="#ffd93d"/>

  <!-- Orange mini star — bottom left -->
  <polygon points="18,73 18.9,75.8 21.7,75.8 19.6,77.4 20.5,80.2 18,78.6 15.5,80.2 16.4,77.4 14.3,75.8 17.1,75.8"
           fill="#ff9a3c" opacity="0.9"/>

  <!-- White dot accents -->
  <circle cx="85" cy="41" r="2"   fill="rgba(255,255,255,0.55)"/>
  <circle cx="20" cy="27" r="1.6" fill="rgba(255,255,255,0.48)"/>
  <circle cx="13" cy="61" r="1.3" fill="rgba(255,255,255,0.42)"/>
  <circle cx="85" cy="67" r="1.1" fill="rgba(255,255,255,0.38)"/>

  <!-- Tiny mint dot — lower right -->
  <circle cx="78" cy="82" r="2.2" fill="#6bcb77" opacity="0.75"/>
</svg>
